<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify Forms Detection</title>
    <meta name="robots" content="noindex,nofollow" />
  </head>
  <body>
    <!--
      This file exists only so Netlify can detect forms at deploy time.
      It should remain static and include every field name used by JS-rendered forms.
    -->

    <!-- 1) Brand Brief -->
    <form
      name="alfa-agent-brand-brief"
      method="POST"
      action="/__forms.html"
      data-netlify="true"
      data-netlify-honeypot="bot-field"
      hidden
    >
      <input type="hidden" name="form-name" value="alfa-agent-brand-brief" />

      <p hidden>
        <label>
          Don’t fill this out:
          <input name="bot-field" type="text" />
        </label>
      </p>

      <input name="company" type="text" />
      <input name="email" type="email" />
      <input name="industry" type="text" />
      <input name="budget" type="text" />
      <input name="goal" type="text" />
      <input name="timeline" type="text" />
      <textarea name="note"></textarea>
    </form>

    <!-- 2) Contact -->
    <form
      name="alfa-media-contact"
      method="POST"
      action="/__forms.html"
      data-netlify="true"
      data-netlify-honeypot="bot-field"
      hidden
    >
      <input type="hidden" name="form-name" value="alfa-media-contact" />

      <p hidden>
        <label>
          Don’t fill this out:
          <input name="bot-field" type="text" />
        </label>
      </p>

      <input name="name" type="text" />
      <input name="email" type="email" />
      <input name="company" type="text" />
      <input name="subject" type="text" />
      <textarea name="message"></textarea>
    </form>

    <!-- 3) Join KOC -->
    <form
      name="alfa-agent-koc-apply"
      method="POST"
      action="/__forms.html"
      data-netlify="true"
      data-netlify-honeypot="bot-field"
      hidden
    >
      <input type="hidden" name="form-name" value="alfa-agent-koc-apply" />

      <p hidden>
        <label>
          Don’t fill this out:
          <input name="bot-field" type="text" />
        </label>
      </p>

      <input name="name" type="text" />
      <input name="email" type="email" />
      <input name="phone" type="text" />
      <input name="platform" type="text" />
      <input name="channel" type="text" />
      <input name="niche" type="text" />
      <input name="followers" type="text" />
      <input name="cadence" type="text" />
      <textarea name="note"></textarea>
    </form>
  </body>
</html>
